# Application Config
base.url=https://www.saucedemo.com
browser=chrome
headless=true

# Test Users
standard.user=standard_user
locked.user=locked_out_user
password=secret_sauce

# Timeouts
implicit.wait=10
explicit.wait=10
page.load.timeout=30

# Reporting
report.path=reports/ExtentReport.html
report.title=Selenium Java Automation Report
report.name=SauceDemo Test Results

# Screenshots
screenshot.dir=reports/screenshots/
screenshot.on.failure=true
